{% extends "base.html" %}
{% block title %}Add Expense — Student Expense Tracker{% endblock %}
{% block content %}
<div class="container">
    <div class="page-header">
        <div>
            <h1>➕ Add New Expense</h1>
            <span class="breadcrumb">Record your spending</span>
        </div>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-sm">← Back to Dashboard</a>
    </div>

    <div class="card fade-in" style="max-width: 600px;">
        <form method="POST" action="{{ url_for('add_expense') }}">
            <div class="form-row">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount" class="form-control" placeholder="0.00" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-control" required>
                        <option value="">Select category</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Travel">🚌 Travel</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Education">📚 Education</option>
                        <option value="Entertainment">🎮 Entertainment</option>
                        <option value="Health">💊 Health</option>
                        <option value="Bills">📄 Bills</option>
                        <option value="Other">📦 Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" class="form-control" value="{{ today }}" required>
            </div>
            <div class="form-group">
                <label for="description">Description (Optional)</label>
                <input type="text" id="description" name="description" class="form-control" placeholder="e.g. Lunch at canteen, Bus fare...">
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; justify-content: center;">💾 Save Expense</button>
        </form>
    </div>
</div>
{% endblock %}
