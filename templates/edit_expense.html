{% extends "base.html" %}
{% block title %}Edit Expense — Student Expense Tracker{% endblock %}
{% block content %}
<div class="container">
    <div class="page-header">
        <div>
            <h1>✏️ Edit Expense</h1>
            <span class="breadcrumb">Update expense details</span>
        </div>
        <a href="{{ url_for('view_expenses') }}" class="btn btn-secondary btn-sm">← Back to Expenses</a>
    </div>

    <div class="card fade-in" style="max-width: 600px;">
        <form method="POST" action="{{ url_for('edit_expense', expense_id=expense['id']) }}">
            <div class="form-row">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount" class="form-control" value="{{ expense['amount'] }}" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-control" required>
                        {% set cats = ['Food', 'Travel', 'Shopping', 'Education', 'Entertainment', 'Health', 'Bills', 'Other'] %}
                        {% for cat in cats %}
                        <option value="{{ cat }}" {{ 'selected' if expense['category'] == cat }}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" class="form-control" value="{{ expense['date'] }}" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" name="description" class="form-control" value="{{ expense['description'] or '' }}">
            </div>
            <div style="display: flex; gap: 12px;">
                <button type="submit" class="btn btn-primary btn-lg" style="flex:1; justify-content: center;">💾 Update Expense</button>
                <a href="{{ url_for('view_expenses') }}" class="btn btn-secondary btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
