<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Student Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-blobs"><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
    <div class="page-wrapper">
        <div class="auth-wrapper">
            <div class="auth-card fade-in">
                <h1>Welcome Back</h1>
                <p class="subtitle">Sign in to manage your expenses</p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                    <div class="flash-msg {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
                {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="john@college.edu" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">🔐 Sign In</button>
                </form>
                <div class="auth-footer">
                    Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
